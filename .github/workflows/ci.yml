name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (pi-container.sh)
        uses: ludeeus/action-shellcheck@1.1.0
        with:
          scandir: .
          severity: warning

      - name: Hadolint (Containerfile)
        uses: hadolint/hadolint-action@v2.1.0
        with:
          dockerfile: Containerfile
          failure-threshold: warning

      - name: Markdownlint (README.md)
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: README.md

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Wrapper logic tests (no build)
        run: |
          chmod +x ./test-wrapper.sh ./test.sh
          ./test-wrapper.sh

      - name: Image smoke tests
        run: ./test.sh

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build image for scanning
        run: podman build -t pi-container-scan -f Containerfile .

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost/pi-container-scan:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'        # report only; do not fail the build yet
          ignore-unfixed: true
