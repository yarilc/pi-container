name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan for base-image CVEs (floating tag)
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: ShellCheck (pi-container.sh)
        uses: ludeeus/action-shellcheck@94e0aab03ca135d11a35e5bfc14e6746dc56e7e9 # 1.1.0
        with:
          scandir: .
          severity: warning

      - name: Hadolint (Containerfile)
        uses: hadolint/hadolint-action@f988afea3da57ee48710a9795b6bb677cc901183 # v2.1.0
        with:
          dockerfile: Containerfile
          failure-threshold: warning

      - name: Markdownlint (README.md)
        uses: DavidAnson/markdownlint-cli2-action@b4c9feab76d8025d1e83c653fa3990936df0e6c8 # v16
        with:
          globs: README.md

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Wrapper logic tests (no build)
        run: |
          chmod +x ./test-wrapper.sh ./test.sh
          ./test-wrapper.sh

      - name: Image smoke tests
        run: ./test.sh

  scan:
    # Skip on pull_request (forks lack security-events: write permission)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read  # needed by codeql-action v4 for upload-sarif
      security-events: write  # for SARIF upload
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build image for scanning
        run: |
          PI_VERSION="$(head -1 .version | tr -d '[:space:]')"
          podman build -t pi-container-scan -f Containerfile --build-arg "PI_VERSION=${PI_VERSION}" .

      - name: Save image as tarball
        run: podman save pi-container-scan -o /tmp/pi-container-scan.tar

      - name: Vulnerability scan (Trivy)
        # Note: using trivy-action v0.36.0; previous v0.29.0 referenced
        # aquasecurity/setup-trivy@v0.2.2 which no longer exists.
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          input: /tmp/pi-container-scan.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          # TODO: change to exit-code: '1' once CVEs are triaged in .trivyignore
          # Currently set to '0' because .trivyignore is empty.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@04800457060cff48cb952d0b0355a5ab4b264a36 # v4.31.11
        with:
          sarif_file: trivy-results.sarif
          category: trivy
