name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan for base-image CVEs (floating tag)
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: ShellCheck (pi-container.sh)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: .
          severity: warning

      - name: Hadolint (Containerfile)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Containerfile
          failure-threshold: warning

      - name: Markdownlint (README.md)
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: README.md

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Wrapper logic tests (no build)
        run: |
          chmod +x ./test-wrapper.sh ./test.sh
          ./test-wrapper.sh

      - name: Image smoke tests
        run: ./test.sh

  scan:
    # Skip on pull_request (forks lack security-events: write permission)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build image for scanning
        run: |
          PI_VERSION="$(head -1 .version | tr -d '[:space:]')"
          podman build -t pi-container-scan -f Containerfile --build-arg "PI_VERSION=${PI_VERSION}" .

      - name: Save image as tarball
        run: podman save pi-container-scan -o /tmp/pi-container-scan.tar

      - name: Vulnerability scan (Trivy)
        # Note: using trivy-action v0.36.0; previous v0.29.0 referenced
        # aquasecurity/setup-trivy@v0.2.2 which no longer exists.
        #
        # Output in table format (visible in CI logs). SARIF upload is not
        # used because the repository does not have GitHub Code Scanning
        # enabled. If code scanning is enabled later, add:
        #   format: sarif
        #   output: trivy-results.sarif
        # followed by github/codeql-action/upload-sarif.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: /tmp/pi-container-scan.tar
          format: table
          severity: CRITICAL,HIGH
          # TODO: change to exit-code: '1' once CVEs are triaged in .trivyignore
          # Currently set to '0' because .trivyignore is empty.
          exit-code: '0'
          ignore-unfixed: true
