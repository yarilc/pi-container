name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan for base-image CVEs (floating tag)
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: ShellCheck (pi-container.sh)
        uses: ludeeus/action-shellcheck@94e0aab03ca135d11a35e5bfc14e6746dc56e7e9 # 1.1.0
        with:
          scandir: .
          severity: warning

      - name: Hadolint (Containerfile)
        uses: hadolint/hadolint-action@f988afea3da57ee48710a9795b6bb677cc901183 # v2.1.0
        with:
          dockerfile: Containerfile
          failure-threshold: warning

      - name: Markdownlint (README.md)
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: README.md

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Wrapper logic tests (no build)
        run: |
          chmod +x ./test-wrapper.sh ./test.sh
          ./test-wrapper.sh

      - name: Image smoke tests
        run: ./test.sh

  scan:
    # Skip on pull_request (forks lack security-events: write permission)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # for SARIF upload
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build image for scanning
        run: podman build -t pi-container-scan -f Containerfile .

      - name: Save image as tarball
        run: podman save pi-container-scan -o /tmp/pi-container-scan.tar

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          input: /tmp/pi-container-scan.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
